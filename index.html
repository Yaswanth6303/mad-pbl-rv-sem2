<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e63946" />
    <title>Recipe Hub - Discover Delicious Recipes</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-primary-custom sticky-top shadow-sm"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="bi bi-egg-fried"></i> Recipe Hub
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="index.html"
                ><i class="bi bi-house-door"></i> Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="html/favorites.html"
                ><i class="bi bi-heart"></i> Favorites</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="hero text-center text-white py-5">
      <div class="container">
        <h1 class="display-5 fw-bold mb-2">What's Cooking Today?</h1>
        <p class="lead mb-4">
          Search thousands of recipes from around the world
        </p>

        <form id="searchForm" class="row g-2 justify-content-center">
          <div class="col-md-6 col-12">
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-white"
                ><i class="bi bi-search"></i
              ></span>
              <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Search by recipe name, e.g. 'chicken'..."
              />
              <button type="submit" class="btn btn-light fw-semibold">
                Search
              </button>
            </div>
          </div>
        </form>
      </div>
    </header>

    <section class="container py-4">
      <div class="row g-3 mb-3 align-items-end">
        <div class="col-md-4">
          <label for="categoryFilter" class="form-label fw-semibold mb-1"
            ><i class="bi bi-funnel"></i> Filter by Category</label
          >
          <select id="categoryFilter" class="form-select">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="ingredientInput" class="form-label fw-semibold mb-1"
            ><i class="bi bi-basket"></i> Filter by Ingredient</label
          >
          <input
            type="text"
            id="ingredientInput"
            class="form-control"
            placeholder="e.g. chicken, garlic, tomato"
          />
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <div class="d-flex gap-2 w-100 justify-content-start">
            <button
              id="ingredientBtn"
              type="button"
              class="btn btn-outline-primary"
              style="min-width: 90px"
            >
              <i class="bi bi-check2-circle"></i> Apply
            </button>
            <button
              id="resetBtn"
              type="button"
              class="btn btn-outline-secondary"
              title="Reset filters"
            >
              <i class="bi bi-arrow-counterclockwise"></i>
            </button>
          </div>
        </div>
      </div>

      <h2 id="resultsTitle" class="h4 fw-bold mt-4 mb-3">Popular Recipes</h2>

      <div id="loader" class="text-center py-5 d-none">
        <div class="spinner-border text-primary-custom" role="status"></div>
        <p class="mt-2 text-muted">Loading recipes...</p>
      </div>

      <div id="errorMsg" class="alert alert-warning d-none"></div>

      <div id="recipeGrid" class="row g-4"></div>
    </section>

    <footer class="bg-dark text-white-50 text-center py-3">
      <small>&copy; 2026 Recipe Hub PWA &middot; Powered by TheMealDB</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sw-register.js"></script>
  </body>
</html>
