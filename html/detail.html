<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e63946" />
  <title>Recipe Details - Recipe Hub</title>

  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" type="image/svg+xml" href="../icons/icon.svg" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary-custom sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">
        <i class="bi bi-egg-fried"></i> Recipe Hub
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house-door"></i> Home</a></li>
          <li class="nav-item"><a class="nav-link" href="favorites.html"><i class="bi bi-heart"></i> Favorites</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <a href="../index.html" class="btn btn-link text-decoration-none mb-3"><i class="bi bi-arrow-left"></i> Back to Recipes</a>

    <div id="loader" class="text-center py-5">
      <div class="spinner-border text-primary-custom" role="status"></div>
      <p class="mt-2 text-muted">Loading recipe...</p>
    </div>

    <div id="errorMsg" class="alert alert-warning d-none"></div>

    <article id="recipeContent" class="d-none">
      <div class="row g-4">
        <div class="col-lg-5">
          <img id="recipeImage" src="" alt="" class="img-fluid rounded shadow-sm w-100" />
          <div class="d-grid gap-2 mt-3">
            <button id="favBtn" class="btn btn-outline-danger btn-lg"><i class="bi bi-heart"></i> <span>Save to Favorites</span></button>
          </div>
          <div class="card mt-3">
            <div class="card-body">
              <h6 class="card-subtitle text-muted mb-2">Recipe Info</h6>
              <p class="mb-1"><strong><i class="bi bi-tag"></i> Category:</strong> <span id="recipeCategory"></span></p>
              <p class="mb-1"><strong><i class="bi bi-globe2"></i> Cuisine:</strong> <span id="recipeArea"></span></p>
              <p class="mb-0" id="youtubeWrap" style="display:none">
                <strong><i class="bi bi-youtube"></i> Video:</strong>
                <a id="recipeYoutube" href="#" target="_blank" rel="noopener">Watch on YouTube</a>
              </p>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <h1 id="recipeTitle" class="fw-bold mb-3"></h1>

          <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#ingredients-tab">
              <i class="bi bi-basket"></i> Ingredients
            </button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#instructions-tab">
              <i class="bi bi-list-ol"></i> Steps
            </button></li>
          </ul>

          <div class="tab-content">
            <div class="tab-pane fade show active" id="ingredients-tab">
              <ul id="ingredientsList" class="list-group"></ul>
            </div>
            <div class="tab-pane fade" id="instructions-tab">
              <ol id="instructionsList" class="step-list"></ol>
            </div>
          </div>
        </div>
      </div>
    </article>
  </div>

  <footer class="bg-dark text-white-50 text-center py-3">
    <small>&copy; 2026 Recipe Hub PWA &middot; Powered by TheMealDB</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/detail.js"></script>
  <script src="../js/sw-register.js"></script>
</body>
</html>
